name: Build Desktop macOS DMG
description: Install electron-builder system dependencies and build the macOS DMG.

runs:
  using: composite
  steps:
    - name: Install system dependencies for electron-builder
      run: |
        sudo apt-get update
        sudo apt-get install -y fakeroot rpm
      shell: bash

    - name: Build macOS DMG
      run: pnpm --filter @remocoder/desktop dist:mac
      shell: bash
