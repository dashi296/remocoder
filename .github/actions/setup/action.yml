name: Setup
description: Setup pnpm/Node 20, and install dependencies.

inputs:
  node-pty-deps:
    description: Install system dependencies required to build node-pty (python3, make, g++)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm

    - name: Install system dependencies for node-pty (Linux)
      if: inputs.node-pty-deps == 'true' && runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 make g++
      shell: bash

    - name: Install setuptools for node-pty (macOS)
      if: inputs.node-pty-deps == 'true' && runner.os == 'macOS'
      run: pip3 install setuptools
      shell: bash

    - run: pnpm install --frozen-lockfile
      shell: bash
