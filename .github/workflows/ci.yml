name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check shared
        run: pnpm --filter @remocoder/shared exec tsc --noEmit

      - name: Type check desktop
        run: pnpm --filter @remocoder/desktop exec tsc --noEmit

      - name: Type check mobile
        run: pnpm --filter @remocoder/mobile exec tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install system dependencies for node-pty
        run: sudo apt-get install -y python3 make g++

      - run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-test-${{ runner.os }}-

      - run: pnpm test

  eas-build:
    name: EAS Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS (${{ matrix.platform }})
        id: eas-build
        working-directory: packages/mobile
        run: |
          BUILD_JSON=$(eas build --platform ${{ matrix.platform }} --profile preview --non-interactive --json 2>/dev/null)
          ARTIFACT_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl')
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download artifact
        run: |
          if [[ "${{ matrix.platform }}" == "ios" ]]; then
            curl -L "${{ steps.eas-build.outputs.artifact_url }}" -o remocoder.ipa
          else
            curl -L "${{ steps.eas-build.outputs.artifact_url }}" -o remocoder.apk
          fi

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: remocoder.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install system dependencies for node-pty and Electron
        run: sudo apt-get install -y python3 make g++ libgtk-3-dev libxss1 libnss3 --fix-missing

      - run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --filter @remocoder/desktop build
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
