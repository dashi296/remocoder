name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            desktop:
              - 'packages/desktop/**'
              - 'packages/shared/**'
            mobile:
              - 'packages/mobile/**'
              - 'packages/shared/**'

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.desktop == 'true' || needs.changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Type check shared
        run: pnpm --filter @remocoder/shared exec tsc --noEmit

      - name: Type check desktop
        if: needs.changes.outputs.desktop == 'true'
        run: pnpm --filter @remocoder/desktop exec tsc --noEmit

      - name: Type check mobile
        if: needs.changes.outputs.mobile == 'true'
        run: pnpm --filter @remocoder/mobile exec tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          node-pty-deps: 'true'

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-test-${{ runner.os }}-

      - run: pnpm test

