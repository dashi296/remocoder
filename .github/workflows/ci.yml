name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Type check shared
        run: pnpm --filter @remocoder/shared exec tsc --noEmit

      - name: Type check desktop
        run: pnpm --filter @remocoder/desktop exec tsc --noEmit

      - name: Type check mobile
        run: pnpm --filter @remocoder/mobile exec tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          node-pty-deps: 'true'

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-test-${{ runner.os }}-

      - run: pnpm test

  eas-build:
    name: EAS Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      contents: write
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS (${{ matrix.platform }})
        id: eas-build
        working-directory: packages/mobile
        env:
          PLATFORM: ${{ matrix.platform }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_JSON=$(eas build --platform "$PLATFORM" --profile preview --non-interactive --json 2>/dev/null)
          ARTIFACT_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl')
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT

      - name: Download artifact
        env:
          PLATFORM: ${{ matrix.platform }}
          ARTIFACT_URL: ${{ steps.eas-build.outputs.artifact_url }}
        run: |
          if [[ "$PLATFORM" == "ios" ]]; then
            curl -L "$ARTIFACT_URL" -o remocoder.ipa
          else
            curl -L "$ARTIFACT_URL" -o remocoder.apk
          fi

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: remocoder.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Desktop (macOS DMG)
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          node-pty-deps: 'true'

      - uses: ./.github/actions/build-desktop

      - name: Upload to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/desktop/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
