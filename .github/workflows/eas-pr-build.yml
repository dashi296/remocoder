name: EAS PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-android:
    name: Build Android (EAS Local)
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          node-pty-deps: 'true'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (EAS Local)
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
          PR_NUMBER: ${{ github.event.number }}
        run: eas build --platform android --profile preview --local --non-interactive --output "../../remocoder-pr${PR_NUMBER}-android.apk"


      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pr-${{ github.event.number }}
          name: "PR #${{ github.event.number }} Build"
          prerelease: true
          body: "Commit: ${{ github.sha }}"
          files: remocoder-pr${{ github.event.number }}-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    name: Build iOS (EAS Local)
    runs-on: macos-26
    environment: preview
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA (EAS Local)
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
          PR_NUMBER: ${{ github.event.number }}
        run: eas build --platform ios --profile preview --local --non-interactive --output "../../remocoder-pr${PR_NUMBER}-ios.ipa"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pr-${{ github.event.number }}
          name: "PR #${{ github.event.number }} Build"
          prerelease: true
          body: "Commit: ${{ github.sha }}"
          files: remocoder-pr${{ github.event.number }}-ios.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    environment: preview
    needs: [build-android, build-ios]
    if: always() && (needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    steps:
      - name: Build Slack payload
        id: payload
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.number }}
          SHA: ${{ github.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          ANDROID_RESULT: ${{ needs.build-android.result }}
          IOS_RESULT: ${{ needs.build-ios.result }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.parse, os

          repo    = os.environ['REPO']
          pr      = os.environ['PR']
          sha     = os.environ['SHA']
          pr_url  = os.environ['PR_URL']
          results = {
              'android': os.environ['ANDROID_RESULT'],
              'ios':     os.environ['IOS_RESULT'],
          }

          def status_label(result):
              return ":white_check_mark: 成功" if result == "success" else ":x: 失敗"

          def qr_url(url):
              return f"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data={urllib.parse.quote(url, safe='')}"

          release_base = f"https://github.com/{repo}/releases/download/pr-{pr}"
          artifact_urls = {
              'android': f"{release_base}/remocoder-pr{pr}-android.apk",
              'ios':     f"{release_base}/remocoder-pr{pr}-ios.ipa",
          }

          blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": f"PR #{pr} ビルド完了 :rocket:"}},
              {"type": "section", "text": {"type": "mrkdwn", "text": f"*コミット:* `{sha}`\n*PR:* <{pr_url}|#{pr}>"}},
              {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": f"*Android :android:*\n{status_label(results['android'])}"},
                  {"type": "mrkdwn", "text": f"*iOS :apple:*\n{status_label(results['ios'])}"},
              ]},
          ]

          for platform in ('android', 'ios'):
              if results[platform] == "success":
                  labels = {'android': ('Android APK QR', 'Android APK QR Code'), 'ios': ('iOS IPA QR', 'iOS IPA QR Code')}
                  title, alt = labels[platform]
                  blocks.append({"type": "image", "title": {"type": "plain_text", "text": title}, "image_url": qr_url(artifact_urls[platform]), "alt_text": alt})

          blocks.append({"type": "actions", "elements": [{"type": "button", "text": {"type": "plain_text", "text": ":arrow_down: 成果物をダウンロード"}, "url": f"https://github.com/{repo}/releases/tag/pr-{pr}", "style": "primary"}]})

          payload = json.dumps({"blocks": blocks}, ensure_ascii=False)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"payload={payload}\n")
          PYEOF

      - name: Post to Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: ${{ steps.payload.outputs.payload }}
