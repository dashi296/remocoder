name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  electron-build:
    name: Electron Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    environment: production
    strategy:
      matrix:
        include:
          - os: macos-latest
            dist_args: --mac
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build and publish Electron app
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIST_ARGS: ${{ matrix.dist_args }}
        run: pnpm dist $DIST_ARGS --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            packages/desktop/dist/**/*.dmg
            packages/desktop/dist/**/*.exe
            packages/desktop/dist/**/*.AppImage
            packages/desktop/dist/**/*.yml
            packages/desktop/dist/**/*.yaml
          if-no-files-found: ignore

  eas-submit:
    name: EAS Build & Submit (${{ matrix.platform }})
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build and Submit on EAS (${{ matrix.platform }})
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          if [[ "$PLATFORM" == "android" ]]; then
            eas build \
              --platform "$PLATFORM" \
              --profile production \
              --non-interactive \
              --auto-submit \
              --no-wait
          else
            eas build \
              --platform "$PLATFORM" \
              --profile production \
              --non-interactive \
              --no-wait
          fi
