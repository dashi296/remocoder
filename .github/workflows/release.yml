name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  electron-build:
    name: Electron Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    environment: production
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            dist_args: --mac
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-pty-deps: 'true'

      - name: Build and publish Electron app
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIST_ARGS: ${{ matrix.dist_args }}
        run: pnpm dist $DIST_ARGS --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            packages/desktop/dist/**/*.dmg
            packages/desktop/dist/**/*.exe
            packages/desktop/dist/**/*.AppImage
            packages/desktop/dist/**/*.yml
            packages/desktop/dist/**/*.yaml
          if-no-files-found: ignore

  eas-build-android:
    name: EAS Local Build (android)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # EAS クラウドビルド（月次クレジット上限のためコメントアウト）
      # - name: Build and Submit on EAS cloud (android)
      #   working-directory: packages/mobile
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      #   run: |
      #     eas build \
      #       --platform android \
      #       --profile production \
      #       --non-interactive \
      #       --auto-submit \
      #       --no-wait

      - name: Build locally (android)
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --local \
            --output build-android.aab

      - name: Submit to Google Play (android)
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas submit \
            --platform android \
            --profile production \
            --non-interactive \
            --path build-android.aab

  eas-build-ios:
    name: EAS Local Build (ios)
    runs-on: macos-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      # EAS クラウドビルド（月次クレジット上限のためコメントアウト）
      # - name: Build and Submit on EAS cloud (ios)
      #   working-directory: packages/mobile
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      #   run: |
      #     eas build \
      #       --platform ios \
      #       --profile production \
      #       --non-interactive \
      #       --no-wait

      - name: Build locally (ios)
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --local \
            --output build-ios.ipa

      - name: Submit to App Store (ios)
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas submit \
            --platform ios \
            --profile production \
            --non-interactive \
            --path build-ios.ipa
