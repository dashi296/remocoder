<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    var lang = navigator.language || navigator.userLanguage || '';
    if (lang.startsWith('ja')) {
      location.replace('./ja/');
    } else {
      location.replace('./en/');
    }
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=./ja/">
  </noscript>
</head>
<body></body>
</html>
